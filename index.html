<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人空间</title>
    <style>
        /* --- 基础样式 --- */
        :root {
            --primary-color: #333;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-secondary: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        /* --- 卡片样式 --- */
        .post-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.1);
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }

        .post-title {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .post-summary {
            font-size: 1rem;
            line-height: 1.6;
            color: #444;
            margin-bottom: 15px;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #333;
            text-transform: uppercase;
        }

        /* --- 图片专用样式 --- */
        .image-container {
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>我的空间</h1>
            <p>记录生活与思考</p>
        </header>

        <main id="feed">
            <!-- 文章将通过 JavaScript 自动插入到这里 -->
        </main>
    </div>

    <!-- 1. 引入刚才创建的数据库文件 -->
    <script src="posts.js"></script>

    <script>
        // 2. 渲染逻辑
        const feedContainer = document.getElementById('feed');

        // 检查 posts 变量是否存在（来自 posts.js）
        if (typeof posts !== 'undefined') {
            
            // 倒序排列，让最新的文章在最上面
            const sortedPosts = posts.slice().reverse();

            sortedPosts.forEach(post => {
                // 创建卡片元素
                const card = document.createElement('div');
                card.className = 'post-card';

                // 构建卡片内容
                let contentHtml = '';

                // 如果是图片类型，显示图片
                if (post.type === 'image') {
                    contentHtml = `
                        <div class="image-container">
                            <img src="${post.content}" alt="${post.title}">
                        </div>
                    `;
                } else {
                    // 如果是文字类型，显示摘要
                    contentHtml = `<p class="post-summary">${post.content}</p>`;
                }

                // 填充 HTML
                card.innerHTML = `
                    <span class="post-date">${post.date}</span>
                    <h2 class="post-title">${post.title}</h2>
                    <span class="tag">${post.type === 'image' ? '📷 图片' : '📝 日记'}</span>
                    ${contentHtml}
                `;

                // 添加到页面
                feedContainer.appendChild(card);
            });

        } else {
            feedContainer.innerHTML = '<p>错误：无法加载 posts.js 数据。</p>';
        }
    </script>
</body>
</html>
