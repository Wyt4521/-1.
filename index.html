<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yggdrasil - 设定</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;

            /* 1. 设置背景图片 */
            background-image: url('./images/indexBackground.png');
            /* 2. 关键样式 */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
        }

        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- 侧边栏样式修改开始 --- */
        .sidebar {
            /* 原始固定宽度 */
            width: 250px;
            /* 添加过渡动画，让宽度变化更平滑 */
            transition: all 0.3s ease;
            overflow: hidden; /* 隐藏收起时超出的内容 */
            flex-shrink: 0;
            
            /* 原有样式保留 */
            padding-right: 20px;
            border-right: 1px solid #ededed;
            margin-right: 20px;
            position: relative; /* 为了让按钮定位 */
        }

        /* 新增：收起状态下的样式 */
        .sidebar.collapsed {
            width: 0; /* 宽度变为0 */
            margin-right: 0; /* 去掉右边距 */
            padding-right: 0;
            border-right: none;
        }

        /* 新增：切换按钮样式 */
        .toggle-btn {
            position: absolute;
            top: 0;
            right: -40px; /* 放在侧边栏外面一点 */
            width: 32px;
            height: 32px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #555;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 10;
            transition: background 0.2s;
        }
        .toggle-btn:hover {
            background: #f0f0f0;
        }

        /* 当侧边栏收起时，把按钮移回来一点，或者保持原位均可 */
        .sidebar.collapsed .toggle-btn {
            right: -32px;
        }

        /* 新增：控制菜单链接的显隐 */
        .nav-links {
            opacity: 1;
            transition: opacity 0.2s ease;
        }
        /* 收起时隐藏文字链接 */
        .sidebar.collapsed .nav-links {
            display: none; /* 直接隐藏，防止占位 */
        }
        /* --- 侧边栏样式修改结束 --- */

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
            /* 增加一点文字阴影，防止背景图太花看不清白字 */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .nav-links a {
            background: white;
            display: flex;
            color: #aca1a1;
            text-decoration: none;
            margin-bottom: 10px;
            padding: 8px 10px; /* 稍微增加一点高度 */
            border-radius: 4px;
            transition: background 0.2s;
        }

        .nav-links a:hover {
            background-color: #907787;
            color: white;
        }

        .content {
            flex-grow: 1;
            /* 增加过渡，让内容区随侧边栏宽度变化而平滑移动 */
            transition: margin-left 0.3s ease;
        }

        h1 {
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 左侧侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <!-- 新增：切换按钮 -->
            <div class="toggle-btn" onclick="toggleSidebar()">☰</div>

            <a href="#" class="logo">MUNE</a>
            <nav class="nav-links">
                <a href="#">首页</a>
                <a href="#">角色档案</a>
                <a href="#">种族设定</a>
                <a href="#">世界观</a>
                <a href="#">时间线</a>
            </nav>
        </aside>

        <!-- 右侧主要内容 -->
        <main class="content">
            <h1>Yggdrasil</h1>

            <div class="card">
                <h2>欢迎来到世界树设定集</h2>
                <p>这里是 Yggdrasil 的核心档案库。</p>
                <p>背景图已成功加载。</p>
            </div>

            <div class="card">
                <h3>设定概览</h3>
                <p>在此处添加你的详细设定内容...</p>
            </div>
        </main>
    </div>

    <script>
        // 获取侧边栏元素
        const sidebar = document.getElementById('sidebar');

        // 定义切换函数
        function toggleSidebar() {
            // 切换 'collapsed' 类名
            sidebar.classList.toggle('collapsed');
        }
    </script>

</body>
</html>
