<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色详情 - Yggdrasil</title>
    <style>
        /* 复用 characters.html 的基础样式 */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            background-image: url('./images/indexBackground.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: #333;
        }

        .top-nav {
            background: rgba(29, 2, 44, 0.9);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-nav .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        .top-nav-links a {
            color: #ededed;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            min-height: 80vh;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #907787;
            text-decoration: none;
            font-weight: bold;
        }
        .back-btn:hover {
            color: #1d022c;
        }

        .character-header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .character-avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #907787;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .character-name {
            font-size: 36px;
            color: #1d022c;
            margin: 0;
        }

        .character-bio {
            font-size: 18px;
            line-height: 1.8;
            color: #555;
            white-space: pre-wrap; /* 保留换行符 */
            margin-bottom: 30px;
        }

        /* 新增：操作按钮容器 */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        /* 新增：按钮样式 */
        .btn {
            display: inline-block;
            padding: 10px 25px;
            background-color: #907787;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: #1d022c;
            transform: translateY(-2px);
        }

        .error-message {
            text-align: center;
            color: red;
            font-size: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="logo">MUNE</a>
        <div class="top-nav-links">
            <a href="index.html">首页</a>
            <a href="characters.html">返回角色列表</a>
        </div>
    </nav>

    <div class="container" id="detailContainer">
        <!-- 内容将由 JS 动态插入 -->
        <div style="text-align:center; padding: 50px;">加载中...</div>
    </div>

    <script>
        (function() {
            // 这里需要复制一份角色数据，或者在实际项目中通过 fetch 获取 JSON
            const characterData = [
                { 
                    name: "多尼米克", 
                    avatar: "./images/avatars/dominic.png", 
                    description: "生长在亚特兰蒂斯遗址之上的冒险家，开朗、天真，对世界抱有无畏的热忱。\n\n尚未被任何谎言浸染，也不知自己终将烧穿哪个旧世界。"
                },
                { 
                    name: "卜不见", 
                    avatar: "./images/avatars/bubujian.png", 
                    description: "东方血统的近战法师，平日里总是一副散漫爱热闹的模样，善谈爱笑，给他一杯大麦酒，他能把全酒馆的人底裤颜色都给掏出来。\n\n擅长速胜的近身格斗，精通乱七八糟的奇怪法术，短轴爆发力强。拥有像猫一样轻巧的身法和隐匿气息的绝技。\n\n好大喜功、自由自信，想要讨人喜欢很容易，只不过他一般懒于去做。"
                },
                { 
                    name: "思佩丝", 
                    avatar: "./images/avatars/spes.png", 
                    description: "正义感十足的传教士兼职游侠。\n\n嫉恶如仇、信仰坚定的半精灵有一套自己的行事准则，毕竟道理讲不通的话她不介意请你去见一见她信仰的神明。"
                },
                { 
                    name: "奥德拉", 
                    avatar: "./images/avatars/aodela.png", 
                    description: "在此处添加奥德拉的详细档案..."
                },
                { 
                    name: "德斯蒂尼", 
                    avatar: "./images/avatars/destine.png", 
                    description: "诞生于世界之初的精灵，曾在信仰中安睡，直到亲手触及信仰的真相。\n\n她走出圣地，混迹人间，以顾问身份出入宫廷，以流浪者姿态坐进田野。\n\n在丰收里看见枯萎，在新生中听见死亡。她对这世界的本质，有了太残忍的洞察——\n\n“我连恨世界树的资格都没有，因为它从未许诺过仁慈。但我无法不恨看见了这一切，却还假装虔诚的自己。”\n\n于是她不再假装，也不再回头。"
                },
                { 
                    name: "赛尔维娜", 
                    avatar: "./images/avatars/Selvina.png", 
                    description: "性情略显冷淡的吟游诗人，长了张与年龄不符的娃娃脸，残念系木头。\n\n内核强大，死倔，理性，叛逆，藐视一切神明造物。\n\n她的足迹跨越国界与经纬，琴声与诗歌织纺成史诗远渡重洋。\n\n“永生的白恶魔，活着的世界历”，具有强大的魔法造诣，见证了世界的起源与终焉。 \n\n意外地喜欢一切活泼明朗的事物，也许是某位故人的缘故。\n\n 一生都在寻找故事的诗人，最终也亲身走进了故事里。"
                },
                { 
                    name: "严缨", 
                    avatar: "./images/avatars/yanying.png", 
                    description: "在此处添加严缨的详细档案..."
                }
            ];

            function init() {
                // 1. 获取 URL 参数
                const params = new URLSearchParams(window.location.search);
                const charName = params.get('name');

                const container = document.getElementById('detailContainer');

                if (!charName) {
                    container.innerHTML = '<div class="error-message">未指定角色名称。<br><a href="characters.html">返回角色列表</a></div>';
                    return;
                }

                // 2. 查找角色数据
                const decodedName = decodeURIComponent(charName);
                const character = characterData.find(c => c.name === decodedName);

                if (!character) {
                    container.innerHTML = `<div class="error-message">找不到角色 "${decodedName}" 的信息。<br><a href="characters.html">返回角色列表</a></div>`;
                    return;
                }

                // 3. 渲染页面
                document.title = `${character.name} - 角色详情`;
                
                // 构建按钮链接，传递角色名称参数
                const galleryUrl = `character-gallery.html?name=${encodeURIComponent(character.name)}`;
                const articleUrl = `character-article.html?name=${encodeURIComponent(character.name)}`;

                container.innerHTML = `
                    <a href="characters.html" class="back-btn">← 返回角色列表</a>
                    <div class="character-header">
                        <img src="${character.avatar}" alt="${character.name}" class="character-avatar" onerror="this.src='./images/avatars/default.png'">
                        <h1 class="character-name">${character.name}</h1>
                    </div>
                    <div class="character-bio">
                        ${character.description}
                    </div>
                    
                    <!-- 新增：操作按钮 -->
                    <div class="action-buttons">
                        <a href="${galleryUrl}" class="btn">图片</a>
                        <a href="${articleUrl}" class="btn">文章</a>
                    </div>
                `;
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
